services:
  question-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVER_BASE_IMAGE: ${SERVER_BASE_IMAGE:-nvcr.io/nvidia/tensorrt:23.09-py3}
    image: ai-generation-question-engine:latest
    restart: unless-stopped
    gpus:
      - driver: nvidia
        device_ids:
          - "${NVIDIA_VISIBLE_DEVICES:-0}"
        capabilities:
          - compute
          - utility
    env_file:
      - .env
    environment:
      SERVER_PORT: "8018"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-test}
      PYTHON_WORKER_ENABLED: "true"
      PYTHON_WORKER_API_PROXY_ENABLED: ${PYTHON_WORKER_API_PROXY_ENABLED:-true}
      PYTHON_WORKER_BASE_URL: http://127.0.0.1:8000
      PYTHON_WORKER_STORAGE_ROOT: /data
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: "${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://192.168.1.148:*,http://120.211.112.121,http://120.211.112.121:*,https://*.pinggy-free.link,https://*.free.pinggy.net,https://*.lhr.life}"
      DB_URL: ${DB_URL:-jdbc:h2:file:/data/java_library;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
      JAVA_STORAGE_LOCAL_ROOT: /data/java_files
      JAVA_DOMAIN_LIBRARY_STORE_PATH: /data/library_store.json
      OCR_FLOW_PROVIDER: mineru
      MINERU_COMMAND: ${HOST_MINERU_VENV:-/home/user/AI_GENERATION_DOCKER/vendor/mineru-venv}/bin/mineru
      MINERU_API_ENABLED: ${MINERU_API_ENABLED:-true}
      MINERU_API_COMMAND: ${HOST_MINERU_VENV:-/home/user/AI_GENERATION_DOCKER/vendor/mineru-venv}/bin/mineru-api
      MINERU_API_HOST: ${MINERU_API_HOST:-127.0.0.1}
      MINERU_API_PORT: ${MINERU_API_PORT:-8002}
      MINERU_API_URL: ${MINERU_API_URL:-http://127.0.0.1:8002}
      MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-1}
      MINERU_API_ENABLE_VLM_PRELOAD: ${MINERU_API_ENABLE_VLM_PRELOAD:-false}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-1800}
      MINERU_VERSION_TIMEOUT_SECONDS: ${MINERU_VERSION_TIMEOUT_SECONDS:-30}
      ENABLE_LLM_SPLIT: ${ENABLE_LLM_SPLIT:-true}
      LLM_BOUNDARY_MAX_CONCURRENCY: ${LLM_BOUNDARY_MAX_CONCURRENCY:-4}
      LLM_EXTERNAL_MAX_CONCURRENCY: ${LLM_EXTERNAL_MAX_CONCURRENCY:-8}
      LLM_STANDARDIZE_INITIAL_CONCURRENCY: ${LLM_STANDARDIZE_INITIAL_CONCURRENCY:-4}
      LLM_STANDARDIZE_MIN_CONCURRENCY: ${LLM_STANDARDIZE_MIN_CONCURRENCY:-2}
      LLM_STANDARDIZE_MAX_CONCURRENCY: ${LLM_STANDARDIZE_MAX_CONCURRENCY:-8}
      LLM_STANDARDIZE_SUCCESS_WINDOW: ${LLM_STANDARDIZE_SUCCESS_WINDOW:-20}
      LLM_STANDARDIZE_COOLDOWN_SECONDS: ${LLM_STANDARDIZE_COOLDOWN_SECONDS:-30}
      AI_STANDARDIZATION_MAX_CONCURRENCY: ${AI_STANDARDIZATION_MAX_CONCURRENCY:-12}
      LLM_ANALYSIS_MAX_CONCURRENCY: ${LLM_ANALYSIS_MAX_CONCURRENCY:-4}
      LLM_STANDARDIZE_MAX_ATTEMPTS: ${LLM_STANDARDIZE_MAX_ATTEMPTS:-2}
      LLM_ANALYSIS_MAX_ATTEMPTS: ${LLM_ANALYSIS_MAX_ATTEMPTS:-2}
      PANDOC_CJK_FONT: ${PANDOC_CJK_FONT:-Noto Sans CJK SC}
      CUDA_VISIBLE_DEVICES: ${OCR_CUDA_VISIBLE_DEVICES:-0}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      MINERU_VIRTUAL_VRAM_SIZE: ${MINERU_VIRTUAL_VRAM_SIZE:-48}
      MINERU_HYBRID_BATCH_RATIO: ${MINERU_HYBRID_BATCH_RATIO:-16}
      OCR_PAPER_LAYOUT_ENABLED: ${OCR_PAPER_LAYOUT_ENABLED:-false}
      OCR_AUTO_STANDARDIZE_MODE: ${OCR_AUTO_STANDARDIZE_MODE:-risky}
      OCR_AUTO_STANDARDIZE_MAX_CONCURRENCY: ${OCR_AUTO_STANDARDIZE_MAX_CONCURRENCY:-2}
      OCR_VISUAL_REPAIR_MAX_CONCURRENCY: ${OCR_VISUAL_REPAIR_MAX_CONCURRENCY:-2}
      OCR_VISUAL_REPAIR_PRELOAD_ENABLED: ${OCR_VISUAL_REPAIR_PRELOAD_ENABLED:-true}
      OCR_VISUAL_REPAIR_PRELOAD_MAX_PAGES: ${OCR_VISUAL_REPAIR_PRELOAD_MAX_PAGES:-4}
    ports:
      - "${APP_HTTP_PORT:-80}:8080"
      - "${APP_COMPAT_HTTP_PORT:-5173}:8080"
      - "${APP_JAVA_PORT:-8018}:8018"
    volumes:
      - ./server-data:/data
      - ./server-data/modelscope-cache:/root/.cache/modelscope
      - ${HOST_MINERU_VENV:-/home/user/AI_GENERATION_DOCKER/vendor/mineru-venv}:${HOST_MINERU_VENV:-/home/user/AI_GENERATION_DOCKER/vendor/mineru-venv}:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/java/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
